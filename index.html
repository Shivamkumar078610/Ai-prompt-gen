    <meta charset="UTF-8">

```
<style>
    :root {
        --primary: #6366f1;
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f8fafc;
    }

    body {
        font-family: 'Segoe UI', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background-color: var(--card);
        padding: 2rem;
        border-radius: 16px;
        width: 90%;
        max-width: 600px;
    }

    textarea {
        width: 100%;
        height: 100px;
        margin-bottom: 10px;
        background: #334155;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 8px;
    }

    button {
        width: 100%;
        padding: 12px;
        background: var(--primary);
        border: none;
        color: white;
        border-radius: 8px;
        cursor: pointer;
    }

    #result {
        margin-top: 15px;
        background: #0f172a;
        padding: 10px;
        border-radius: 8px;
        min-height: 50px;
        white-space: pre-wrap;
    }
</style>
```

</head>

<body>

<div class="container">
    <h2>🔥 AI Prompt Generator</h2>

```
<textarea id="input" placeholder="Enter your idea..."></textarea>

<button onclick="generatePrompt()">Generate</button>

<div id="result">Your result will appear here...</div>
```

</div>

<script>
async function generatePrompt() {
    const input = document.getElementById("input").value;
    const resultDiv = document.getElementById("result");

    resultDiv.innerText = "Generating...";

    try {
        const response = await fetch("https://ai-prompt-gen-3.onrender.com", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                mode: "image",
                type: "text",
                concept: input
            })
        });

        const data = await response.json();

        if (data.prompt) {
            resultDiv.innerText = data.prompt;
        } else {
            resultDiv.innerText = "Error: " + data.error;
        }

    } catch (error) {
        resultDiv.innerText = "❌ Failed to fetch. Check backend or internet.";
        console.error(error);
    }
}
</script>

</body>
</html>
